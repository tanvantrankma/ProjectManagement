spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            routes:
                - id: department-service
                  uri: http://localhost:8081
                  predicates:
                    - Path=/api/v1/departments/**

                - id: position-service
                  uri: http://localhost:8082
                  predicates:
                    - Path=/api/v1/possitions/**
                
                - id: account-service
                  uri: http://localhost:8083
                  predicates:
                    - Path=/api/v1/accounts/**
                
                - id: auth-service
                  uri: http://localhost:8764
                  predicates:
                    - Path=/api/v1/auth/**


