spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            routes:
                - id: productservice
                  uri: http://localhost:8384
                  predicates:
                    - Path=/api/v1/products/**

                - id: orderservice
                  uri: http://localhost:8382
                  predicates:
                    - Path=/api/v1/orders/**

                - id: user-service
                  uri: http://localhost:8381
                  predicates:
                    - Path=/api/v1/accounts/**

                - id: auth-service
                  uri: http://localhost:8764
                  predicates:
                    - Path=/api/v1/auth/**

